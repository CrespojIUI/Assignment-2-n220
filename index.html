<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculations</title>
    <style>
        img {
            border: 2px solid gray;
            padding: 5px;
            width: 60%;
        }

        div {
            border: 1px solid black;
            width: 200px;
            float: left;
            padding: 5px 10px;
            margin-right: 1.5em;
        }

        section {
            border: 1px solid black;
            margin-bottom: 1em;
            padding: 0.25em 1em;
        }

        .clearfix::before,
        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>
</head>

<body>
    <h1>Simple Calculations</h1>
    <p>Read the directions and answer the following problems.</p>

    <section>
        <h3>Dating</h3>
        <p>Larry takes two friends to the movie.</p>
        <p id="ttCost"></p>
    </section>

    <section>
        <h3>Shopping</h3>
        <p id="bank"></p>
        <p id="addJacket"></p>
    </section>

    <section>
        <h3>Pizza</h3>
        <p id="profPizza"></p>
    </section>

    <section class="clearfix">
        <h3>Monty's Mega Bar</h3>
        <div>
            <h3>Monty's Answers</h3>
            <p id="Monty"></p>
        </div>
    </section>

    <section>
        <h3>Average Earned Tips</h3>
        <p id="tips"></p>
    </section>

    <!-- JS at bottom so DOM loads first -->
    <script src="index.js"></script>
</body>

</html>
